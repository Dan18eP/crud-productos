<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - AWS DynamoDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">
                <i class="fas fa-boxes text-blue-600 mr-2"></i>Gestión de Inventario
            </h1>
            <p class="text-slate-500 italic">Conectado a Amazon DynamoDB (Capa Gratuita)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Formulario -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-lg p-6 border border-slate-200 sticky top-8">
                    <h2 id="form-title" class="text-xl font-bold text-slate-700 mb-6 flex items-center">
                        <i class="fas fa-plus-circle text-blue-500 mr-2"></i>Nuevo Producto
                    </h2>
                    <form id="form-producto" class="space-y-4">
                        <input type="hidden" id="producto-id">
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Nombre</label>
                            <input type="text" id="nombre" placeholder="Ej. Monitor Gamer" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Precio</label>
                                <input type="number" id="precio" placeholder="0.00" step="0.01" min="0"
                                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Cantidad</label>
                                <input type="number" id="cantidad" placeholder="0" min="0"
                                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" required>
                            </div>
                        </div>
                        <div class="pt-4 flex flex-col gap-2">
                            <button type="submit" id="btn-submit"
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                                <i class="fas fa-save mr-2"></i>Guardar Producto
                            </button>
                            <button type="button" id="cancelar-edicion"
                                class="hidden w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                                <i class="fas fa-times mr-2"></i>Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Listado -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                    <!-- Buscador -->
                    <div class="p-4 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 class="text-xl font-bold text-slate-700">Productos</h2>
                        <div class="relative w-full md:w-64">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fas fa-search"></i>
                            </span>
                            <input type="text" id="busqueda" placeholder="Buscar producto..." 
                                class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                        </div>
                    </div>

                    <!-- Tabla -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-100 text-slate-600 uppercase text-xs font-bold">
                                    <th class="px-6 py-4">Producto</th>
                                    <th class="px-6 py-4">Precio</th>
                                    <th class="px-6 py-4">Stock</th>
                                    <th class="px-6 py-4 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-productos" class="divide-y divide-slate-100 text-slate-700">
                                <!-- Filas dinámicas -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Empty State -->
                    <div id="empty-state" class="hidden py-12 text-center">
                        <i class="fas fa-inbox text-slate-300 text-5xl mb-4"></i>
                        <p class="text-slate-500">No se encontraron productos.</p>
                    </div>

                    <!-- Loader -->
                    <div id="loader" class="py-12 text-center">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
                        <p class="text-slate-500 mt-2">Cargando desde DynamoDB...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Modal Confirmación -->
    <div id="modal-delete" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl transform transition-all">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-600"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">¿Eliminar producto?</h3>
                <p class="text-slate-500 text-sm mt-2">Esta acción no se puede deshacer y el registro desaparecerá de DynamoDB.</p>
            </div>
            <div class="mt-6 flex gap-3">
                <button id="btn-cancel-delete" class="flex-1 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-semibold transition">Cancelar</button>
                <button id="btn-confirm-delete" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold transition">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
